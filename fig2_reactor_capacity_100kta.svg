<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="720" viewBox="0 0 1320 720" role="img" aria-labelledby="title desc">
<title id="title">Required production bioreactor capacity for 100 kt per year</title>
<desc id="desc">Horizontal bar chart comparing perfusion, large-scale batch, and local-scale batch scenarios.</desc>
<rect x="0" y="0" width="100%" height="100%" fill="#FFFFFF"/>
<text x="660.00" y="58.00" font-family="Arial, Helvetica, sans-serif" font-size="24.0" font-weight="bold" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">Required production bioreactor capacity for 100 kt per year</text>
<text x="660.00" y="98.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="normal" fill="#4D4D4D" text-anchor="middle" dominant-baseline="middle">The x-axis is log-scaled to preserve differences across one order of magnitude.</text>
<line x1="320.00" y1="510.00" x2="1060.00" y2="510.00" stroke="#2A2A2A" stroke-width="2.0"/>
<line x1="320.00" y1="170.00" x2="320.00" y2="510.00" stroke="#2A2A2A" stroke-width="2.0"/>
<line x1="320.00" y1="170.00" x2="320.00" y2="510.00" stroke="#D9D9D9" stroke-width="1.2"/>
<text x="320.00" y="550.00" font-family="Arial, Helvetica, sans-serif" font-size="15.0" font-weight="normal" fill="#444444" text-anchor="middle" dominant-baseline="middle">1,000</text>
<line x1="559.03" y1="170.00" x2="559.03" y2="510.00" stroke="#D9D9D9" stroke-width="1.2"/>
<text x="559.03" y="550.00" font-family="Arial, Helvetica, sans-serif" font-size="15.0" font-weight="normal" fill="#444444" text-anchor="middle" dominant-baseline="middle">3,000</text>
<line x1="820.97" y1="170.00" x2="820.97" y2="510.00" stroke="#D9D9D9" stroke-width="1.2"/>
<text x="820.97" y="550.00" font-family="Arial, Helvetica, sans-serif" font-size="15.0" font-weight="normal" fill="#444444" text-anchor="middle" dominant-baseline="middle">10,000</text>
<line x1="1060.00" y1="170.00" x2="1060.00" y2="510.00" stroke="#D9D9D9" stroke-width="1.2"/>
<text x="1060.00" y="550.00" font-family="Arial, Helvetica, sans-serif" font-size="15.0" font-weight="normal" fill="#444444" text-anchor="middle" dominant-baseline="middle">30,000</text>
<text x="690.00" y="602.00" font-family="Arial, Helvetica, sans-serif" font-size="17.0" font-weight="bold" fill="#1A1A1A" text-anchor="middle" dominant-baseline="middle">Total required production bioreactor volume (m3, log scale)</text>
<text x="290.00" y="229.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">Perfusion</text>
<text x="290.00" y="251.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">main model</text>
<rect x="320.00" y="216.00" width="207.67" height="48.00" fill="#0072B2"/>
<text x="543.67" y="240.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="normal" fill="#222222" text-anchor="start" dominant-baseline="middle">2,597 m3  (1,299 reactors)</text>
<text x="290.00" y="339.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">Batch</text>
<text x="290.00" y="361.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">90:10 large scale</text>
<rect x="320.00" y="326.00" width="654.28" height="48.00" fill="#D55E00"/>
<text x="990.28" y="350.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="normal" fill="#222222" text-anchor="start" dominant-baseline="middle">20,231 m3  (810 reactors)</text>
<text x="290.00" y="449.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">Batch</text>
<text x="290.00" y="471.00" font-family="Arial, Helvetica, sans-serif" font-size="16.0" font-weight="bold" fill="#1A1A1A" text-anchor="end" dominant-baseline="middle">90:10 local scale</text>
<rect x="320.00" y="436.00" width="653.76" height="48.00" fill="#009E73"/>
